<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>SCORPION MODZ KEY — Rotating (3-day)</title>

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="page">
    <div class="card">
      <div class="logo-wrap" aria-hidden="true">
        <svg viewBox="0 0 64 64" class="logo" xmlns="http://www.w3.org/2000/svg">
          <defs>
            <linearGradient id="g" x1="0" x2="1" y1="0" y2="1">
              <stop offset="0" stop-color="#ff3b6b"/>
              <stop offset="1" stop-color="#ff7a3d"/>
            </linearGradient>
          </defs>
          <circle cx="32" cy="32" r="30" fill="#0b0b0b" />
          <g transform="translate(6,6)" fill="url(#g)">
            <path d="M22 2C14 2 8 8 8 16s6 14 14 14 14-6 14-14S30 2 22 2Zm0 4a10 10 0 110 20 10 10 0 010-20z"/>
            <circle cx="22" cy="12" r="2.6" fill="#0b0b0b"/>
          </g>
        </svg>
      </div>

      <h1 class="title">SCORPION MODZ KEY</h1>

      <p class="subtitle">
        The key rotates automatically every 3 days. The current key below is generated deterministically from the current 3‑day period.
      </p>

      <div class="controls">
        <div class="rotation-info">
          <div>Current period index: <span id="periodIdx">—</span></div>
          <div>Next rotation: <span id="nextRotation">—</span></div>
          <div>Time until rotation: <span id="countdown">—</span></div>
        </div>
      </div>

      <label class="field-label" for="keyOutput">Your Key:</label>
      <div class="key-row">
        <input id="keyOutput" class="key-output" readonly aria-readonly="true" value="" />
      </div>

      <button id="copyBtn" class="btn btn-secondary" type="button">Copy Key</button>

      <div class="follow">
        <span>Follow us:</span>
        <div class="socials">
          <a class="btn btn-telegram" href="https://t.me/Ganmae"  target="_blank" rel="noopener noreferrer">Telegram Channel</a>
          <a class="btn btn-youtube" href="https://www.youtube.com/@Ganmae"  target="_blank" rel="noopener noreferrer">YouTube Channel</a>
        </div>
      </div>
    </div>
  </main>

  <script src="script.js"></script>
</body>
</html>
